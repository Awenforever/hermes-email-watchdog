name: CI

on:
  push:
  pull_request:

jobs:
  static-and-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bash scripts/ci.sh
      - run: bash tests/test_repository_lifecycle.sh "$GITHUB_WORKSPACE"
