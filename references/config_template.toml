# Himalaya email account configuration template
# Copy this file and fill in your credentials.
# Place at: ~/.config/himalaya/config_<name>.toml

[accounts.YOUR_ACCOUNT_NAME]
email = "you@example.com"
display-name = "Your Name"
default = true

# --- IMAP (incoming) ---
backend.type = "imap"
backend.host = "imap.example.com"
backend.port = 993
backend.encryption.type = "tls"
backend.login = "you@example.com"
backend.auth.type = "password"
# Use a command to retrieve password (never hardcode in shared configs)
backend.auth.cmd = "echo 'your-app-password-here'"

# --- SMTP (outgoing) ---
message.send.backend.type = "smtp"
message.send.backend.host = "smtp.example.com"
message.send.backend.port = 465
message.send.backend.encryption.type = "tls"
message.send.backend.login = "you@example.com"
message.send.backend.auth.type = "password"
message.send.backend.auth.cmd = "echo 'your-app-password-here'"

# --- Folder aliases (himalaya v1.2.0+ syntax) ---
# Adjust to match your provider's actual folder names.
# Gmail example:
#   folder.aliases.sent = "[Gmail]/Sent Mail"
#   folder.aliases.drafts = "[Gmail]/Drafts"
#   folder.aliases.trash = "[Gmail]/Trash"
# Exchange/Outlook example:
#   folder.aliases.sent = "Sent Items"
#   folder.aliases.drafts = "Drafts"
#   folder.aliases.trash = "Deleted Items"
folder.aliases.inbox = "INBOX"
folder.aliases.sent = "Sent"
folder.aliases.drafts = "Drafts"
folder.aliases.trash = "Trash"


# ── Common provider settings ────────────────────────────────────

# Gmail:
#   IMAP: imap.gmail.com:993 (TLS)
#   SMTP: smtp.gmail.com:465 (TLS)
#   Requires App Password: https://myaccount.google.com/apppasswords
#   Folders: INBOX, [Gmail]/Sent Mail, [Gmail]/Drafts, [Gmail]/Trash

# USTC Mail (mail.ustc.edu.cn):
#   IMAP: mail.ustc.edu.cn:993 (TLS)
#   SMTP: mail.ustc.edu.cn:465 (TLS)
#   Requires App Password (set in mail.ustc.edu.cn settings)
#   Folders: INBOX, Sent Items, Drafts, Trash, Junk E-mail

# QQ Mail (qq.com):
#   IMAP: imap.qq.com:993 (TLS)
#   SMTP: smtp.qq.com:465 (TLS)
#   Requires authorization code (not login password)

# Outlook/Hotmail:
#   IMAP: outlook.office365.com:993 (TLS)
#   SMTP: smtp-mail.outlook.com:587 (STARTTLS)
#   Folders: INBOX, Sent Items, Drafts, Deleted Items, Junk Email